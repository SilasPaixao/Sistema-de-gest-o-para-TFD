version: '3.8'

services:
  # ==========================================================
  # Servidor Web (React Frontend + Node.js/Express Backend)
  # ==========================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tfd_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Conexão automática com o container PostgreSQL abaixo
      - DATABASE_URL=postgresql://postgres:postgres_secure_pass@db:5432/tfd_db
      # Chave secreta de JWT para segurança das APIs
      - JWT_SECRET=sua_chave_secreta_super_segura_desenvolvimento_local
      # (Opcional) Configurações de bucket S3 para backup (lidas do seu arquivo .env local se existirem)
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
    volumes:
      # Monta o diretório de dados localmente para manter os backups e logs locais persistidos
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy

  # ==========================================================
  # Banco de Dados PostgreSQL Relacional
  # ==========================================================
  db:
    image: postgres:15-alpine
    container_name: tfd_db_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secure_pass
      - POSTGRES_DB=tfd_db
    ports:
      - "5432:5432" # Expõe para que você possa conectar com DBeaver/pgAdmin na sua máquina
    volumes:
      # Persiste os dados de tabelas no volume gerenciado pelo Docker
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tfd_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
